<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Audio Recorder WebSocket</title>
</head>

<body>
    <h1>Audio Recorder</h1>
    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
    <p id="status">Status: Idle</p>
    <h1>Transcribed Text</h1>
    <code id="data">Record something</code>

    <script>
        let ws;
        let mediaRecorder;
        let stream;
        let shouldContinue = false;

        async function startRecordingChunk() {
            mediaRecorder = new MediaRecorder(stream);


            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                    ws.send(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                if (shouldContinue) {
                    // Restart recording after 30s chunk
                    startRecordingChunk();
                }
            };

            mediaRecorder.start(); // Start recording
            setTimeout(() => {
                if (mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                }
            }, 30 * 1000); // 30 seconds
        }

        document.getElementById('startBtn').addEventListener('click', async () => {
            ws = new WebSocket('ws://localhost:8080/transcribe');

            ws.onopen = () => {
                console.log('WebSocket connection established');
                document.getElementById('status').innerText = 'Status: Recording...';
                document.getElementById('data').innerText = '';
            };

            ws.onmessage = (event) => {
                document.getElementById('data').innerText += event.data;
            };

            ws.onclose = () => {
                console.log('WebSocket connection closed');
                document.getElementById('status').innerText = 'Status: Disconnected';
            };

            stream = await navigator.mediaDevices.getUserMedia({audio: true});
            shouldContinue = true;
            startRecordingChunk();

            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            shouldContinue = false;
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
            ws.close();

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('status').innerText = 'Status: Stopped';
        });
    </script>
</body>
</html>
